name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write  # required for npm provenance / trusted publishing

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release  # configured for npm publishing when NPM_TOKEN is present

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build and test package
        run: npm run ci

      - name: Create npm package tarball
        run: npm pack

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tgz"
          generate_release_notes: true

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is not configured; skipping npm publish"
            exit 0
          fi
          npm publish --provenance --access public
